<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Panel — Medic Data</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a href="/" class="navbar-brand">
    <div class="navbar-brand-dot"></div>
    Medic Data
  </a>
  <div class="navbar-right">
    <span class="navbar-nombre">Hola, <span id="nombre-display">—</span></span>
    <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
  </div>
</nav>

<!-- Contenido principal -->
<main class="main">

  <div class="bienvenida">
    <h1 id="titulo-bienvenida">Bienvenido</h1>
    <p>Tu historial médico personal, seguro y siempre disponible.</p>
  </div>

  <div class="grid">

    <!-- Card QR -->
    <div class="card qr-card">
      <div class="card-title">Compartir con profesional</div>
      <button class="btn-qr" id="btn-generar-qr">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3zM17 17h3v3h-3zM14 20h3"/></svg>
        Generar código QR
      </button>
      <div class="qr-wrapper" id="qr-wrapper">
        <canvas id="qr-canvas"></canvas>
        <div class="qr-expira">⏱ Válido por 15 minutos</div>
        <div class="qr-countdown" id="qr-countdown"></div>
        <div id="qr-url"></div>
      </div>
    </div>

    <!-- Card datos personales -->
    <div class="card">
      <div class="card-title">Mis datos</div>
      <div id="datos-personales">
        <div class="loading">Cargando...</div>
      </div>
    </div>

  </div>

  <!-- Historial médico -->
  <div class="historial-header">
    <h2>Historial médico</h2>
    <span class="badge-count" id="badge-count">0 registros</span>
  </div>
  <div id="historial-container">
    <div class="loading">Cargando historial...</div>
  </div>

</main>

<div id="mensaje-global"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="../js/paciente.js"></script>
</body>
</html>
