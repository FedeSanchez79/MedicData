<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Panel — Medic Data</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a href="/" class="navbar-brand">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="#1A5CFF" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="10" y="3" width="4" height="18" rx="1"/>
      <rect x="3" y="10" width="18" height="4" rx="1"/>
    </svg>
    Medic Data
  </a>
  <div class="navbar-center">
    <a href="/pages/paciente.html" class="nav-link active">Historial</a>
    <a href="/pages/perfil.html" class="nav-link">Mi perfil</a>
  </div>
  <div class="navbar-right">
    <span class="navbar-nombre">Hola, <span id="nombre-display">—</span></span>
    <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
  </div>
</nav>

<!-- Contenido principal -->
<main class="main">

  <div class="bienvenida">
    <h1 id="titulo-bienvenida">Bienvenido</h1>
    <p>Tu historial médico personal, seguro y siempre disponible.</p>
  </div>

  <!-- Sección QR -->
  <div class="qr-section">
    <h2>Código QR médico</h2>
    <p>Generá un código QR temporal para compartir tu historial con un médico. Expira en 15 minutos.</p>
    <button class="btn-primary" id="btn-generar-qr">Generar QR</button>
    <div id="qr-display" style="display:none; margin-top:1.2rem; text-align:center;">
      <canvas id="qr-canvas" style="display:block; margin:0 auto; border-radius:8px;"></canvas>
      <p class="qr-countdown">Expira en: <span id="qr-timer" style="font-weight:600;">15:00</span></p>
    </div>
  </div>

  <!-- Historial médico -->
  <div class="historial-header">
    <h2>Historial médico</h2>
    <span class="badge-count" id="badge-count">0 registros</span>
  </div>
  <div id="historial-container">
    <div class="skeleton-lista">
      <div class="skeleton-item">
        <div class="skeleton-badge"></div>
        <div class="skeleton-body">
          <div class="skeleton-line sk-title"></div>
          <div class="skeleton-line sk-desc"></div>
          <div class="skeleton-line sk-meta"></div>
        </div>
      </div>
      <div class="skeleton-item" style="animation-delay:.15s">
        <div class="skeleton-badge"></div>
        <div class="skeleton-body">
          <div class="skeleton-line sk-title"></div>
          <div class="skeleton-line sk-desc"></div>
          <div class="skeleton-line sk-meta"></div>
        </div>
      </div>
      <div class="skeleton-item" style="animation-delay:.3s">
        <div class="skeleton-badge"></div>
        <div class="skeleton-body">
          <div class="skeleton-line sk-title"></div>
          <div class="skeleton-line sk-desc"></div>
          <div class="skeleton-line sk-meta"></div>
        </div>
      </div>
    </div>
  </div>

</main>

<div id="mensaje-global"></div>

<script src="../js/paciente.js"></script>
</body>
</html>
