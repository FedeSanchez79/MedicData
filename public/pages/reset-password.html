<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medic Data — Nueva contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-layout">

<div class="wrapper">

  <!-- Panel izquierdo -->
  <div class="panel-izq">
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
        </svg>
      </div>
      <span class="logo-texto">Medic Data</span>
    </div>

    <div class="panel-izq-copy">
      <h2>Creá tu nueva contraseña</h2>
      <p>Elegí una contraseña segura para proteger tu cuenta de salud.</p>
    </div>

    <div class="features">
      <div class="feature-item"><div class="feature-dot"></div>Tu historial médico en un solo lugar</div>
      <div class="feature-item"><div class="feature-dot"></div>Accedé desde cualquier dispositivo</div>
      <div class="feature-item"><div class="feature-dot"></div>Vos decidís quién ve tus datos</div>
    </div>
  </div>

  <!-- Panel derecho -->
  <div class="panel-der">
    <div id="resetSection">
      <h1 class="form-title">Nueva contraseña</h1>
      <p class="form-sub">Ingresá y confirmá tu nueva contraseña</p>
      <form id="resetForm">
        <div class="campo">
          <label for="newPassword">Nueva contraseña</label>
          <div class="campo-pass-wrapper">
            <input type="password" id="newPassword" placeholder="••••••••" required autocomplete="new-password" />
            <button type="button" class="toggle-pass" data-target="newPassword" aria-label="Mostrar contraseña">
              <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="icon-eye-off hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div class="campo">
          <label for="confirmNewPassword">Confirmar contraseña</label>
          <div class="campo-pass-wrapper">
            <input type="password" id="confirmNewPassword" placeholder="••••••••" required autocomplete="new-password" />
            <button type="button" class="toggle-pass" data-target="confirmNewPassword" aria-label="Mostrar contraseña">
              <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="icon-eye-off hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-principal">Guardar nueva contraseña</button>
        <div class="cambiar-form">
          <a href="/" class="forgot-link">Volver al inicio de sesión</a>
        </div>
      </form>
      <div id="messageReset"></div>
    </div>
  </div>

</div>

<script src="../js/config.js"></script>
<script src="../js/reset-password.js"></script>
</body>
</html>
